name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

        - name: macOS
          os: macos-latest

        - name: iOS
          os: macos-latest
          target: iOS

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']
    permissions:
      contents: write

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Debug
        run: |
          echo "Ref: ${{ github.ref }}"
          echo "Build output: ${{ steps.build.outputs.build-output }}"
          ls -la ${{ steps.build.outputs.build-output }} || echo "path not found"

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

      - name: Upload to nightly release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: Automated nightly build
          files: ${{ steps.build.outputs.build-output }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to dev nightly release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-dev
          name: Dev Nightly Build
          prerelease: true
          body: Automated dev nightly build
          files: ${{ steps.build.outputs.build-output }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}